<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapatIn - Manajemen Notulensi Rapat</title>
    <meta name="description" content="Aplikasi manajemen notulensi rapat yang modern, efisien, dan elegan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div id="app">
        <!-- Sidebar Navigation (Desktop) -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-handshake"></i>
                    <span>RapatIn</span>
                </div>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </li>
                <li class="nav-item" data-page="meetings">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Rapat</span>
                </li>
                <li class="nav-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profil</span>
                </li>
                <li class="nav-item" data-page="about">
                    <i class="fas fa-info-circle"></i>
                    <span>Tentang</span>
                </li>
                <li class="nav-item admin-only" data-page="admin" style="display: none;">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Keluar</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Cari rapat atau lokasi..." id="global-search">
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Notifikasi">
                        <i class="far fa-bell"></i>
                        <span class="badge"></span>
                    </button>
                    <div class="user-profile-sm" id="header-profile-trigger">
                        <img src="https://ui-avatars.com/api/?name=User&background=800000&color=fff" alt="Avatar" id="header-avatar">
                        <span id="header-username">Pengguna</span>
                    </div>
                </div>
            </header>

            <div id="page-container" class="page-container">
                <!-- Pages will be injected here -->
            </div>
        </main>

        <!-- Mobile Navigation -->
        <nav class="mobile-nav">
            <div class="nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Beranda</span>
            </div>
            <div class="nav-item" data-page="meetings">
                <i class="fas fa-calendar-alt"></i>
                <span>Rapat</span>
            </div>
            <div class="nav-item plus-btn" id="add-meeting-btn">
                <i class="fas fa-plus"></i>
            </div>
            <div class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Profil</span>
            </div>
            <div class="nav-item" data-page="about">
                <i class="fas fa-info-circle"></i>
                <span>Tentang</span>
            </div>
            <div class="nav-item admin-only" data-page="admin" style="display: none;">
                <i class="fas fa-user-shield"></i>
                <span>Admin</span>
            </div>
        </nav>

        <!-- Floating Action Button (Desktop Only) -->
        <button class="fab" id="fab-add">
            <i class="fas fa-plus"></i>
            <span>Buat Rapat</span>
        </button>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay"></div>
    
    <!-- Meeting Form Modal -->
    <div id="meeting-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Buat Rapat Baru</h3>
                <button class="close-modal">&times;</button>
            </header>
            <form id="meeting-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="title">Judul Rapat</label>
                    <input type="text" id="title" required placeholder="Contoh: Rapat Koordinasi Mingguan">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Tanggal</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Waktu</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="location">Lokasi</label>
                    <input type="text" id="location" required placeholder="Contoh: Ruang Meeting A, Lt. 2">
                </div>
                <div class="form-group">
                    <label for="description">Deskripsi / Notulensi</label>
                    <textarea id="description" rows="5" placeholder="Tuliskan detail rapat di sini..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary close-modal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth Screens (Hidden by default if logged in) -->
    <div id="auth-container" class="auth-container hidden">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-handshake"></i>
                <h1>RapatIn</h1>
            </div>
            <div id="login-form-container">
                <h2>Selamat Datang</h2>
                <p>Silakan masuk ke akun Anda</p>
                <form id="login-form">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="login-email" required placeholder="nama@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Kata Sandi</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Masuk</button>
                </form>
                <p class="auth-footer">Belum punya akun? <a href="#" id="to-register">Daftar</a></p>
            </div>
            <div id="register-form-container" class="hidden">
                <h2>Daftar Akun</h2>
                <p>Mulai kelola rapat Anda dengan mudah</p>
                <form id="register-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap</label>
                        <input type="text" id="reg-name" required placeholder="Nama Anda">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="reg-email" required placeholder="nama@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Kata Sandi</label>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Daftar</button>
                </form>
                <p class="auth-footer">Sudah punya akun? <a href="#" id="to-login">Masuk</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
